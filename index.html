          <Panel title="CM FULL TABLE">
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><thead><tr>{["CM","Accounts","% Share","Domains","Bar"].map(h=><th key={h} style={{textAlign:"left",padding:"9px 12px",borderBottom:`1px solid ${C.cardBorder}`,color:C.textLabel,fontSize:10,fontWeight:700,textTransform:"uppercase",background:C.tableHead}}>{h}</th>)}</tr></thead><tbody>
              {(()=>{const total=od.campaignManagers.reduce((s,r)=>s+r.accounts,0);return[...od.campaignManagers].sort((a,b)=>b.accounts-a.accounts).map((r,i)=><tr key={i} style={{borderBottom:`1px solid ${C.tableBorder}`,background:i%2?C.tableAlt:C.card}}><td style={{padding:"9px 12px",fontWeight:700,color:r.color}}>{r.cm}</td><td style={{padding:"9px 12px",color:C.textPrimary,fontWeight:700}}>{fmtFull(r.accounts)}</td><td style={{padding:"9px 12px",color:C.textSecondary}}>{total>0?((r.accounts/total)*100).toFixed(1):0}%</td><td style={{padding:"9px 12px",color:C.textMuted}}>{fmtFull(r.domains)}</td><td style={{padding:"9px 12px",minWidth:100}}><div style={{height:5,background:"#e2e8f0",borderRadius:99}}><div style={{width:total>0?`${(r.accounts/total)*100}%`:"0%",height:"100%",background:r.color,borderRadius:99,maxWidth:"100%"}}/></div></td></tr>);})()}
              <tr style={{borderTop:`2px solid ${C.cardBorder}`,background:C.tableHead}}><td style={{padding:"9px 12px",fontWeight:800,color:C.textPrimary}}>Total</td><td style={{padding:"9px 12px",color:oc.primary,fontWeight:800}}>{fmtFull(od.campaignManagers.reduce((s,r)=>s+r.accounts,0))}</td><td style={{padding:"9px 12px",color:C.textSecondary}}>100%</td><td style={{padding:"9px 12px",color:"#7c3aed",fontWeight:800}}>{fmtFull(od.campaignManagers.reduce((s,r)=>s+r.domains,0))}</td><td/></tr>
            </tbody></table>
          </Panel>
        </div>)}

        {/* ── INBOX MANAGERS ── */}
        {inboxTab==="Inbox Managers"&&(<div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
            <MiniCard icon="🧑‍💼" label="Inbox Managers" value={String(od.inboxManagers.filter(m=>m.accounts>0).length)} color={oc.primary}/>
            <MiniCard icon="📊" label="Total Accounts" value={fmtFull(od.inboxManagers.reduce((s,r)=>s+r.accounts,0))} color="#0891b2"/>
            {(()=>{const top=[...od.inboxManagers].sort((a,b)=>b.accounts-a.accounts)[0]||{manager:"—",accounts:0};return<MiniCard icon="🏆" label="Top Manager" value={top.manager} color="#d97706" sub={`${fmtFull(top.accounts)} accounts`}/>;})()}
            <MiniCard icon="🌐" label="Total Domains" value={fmtFull(od.inboxManagers.reduce((s,r)=>s+r.domains,0))} color="#7c3aed"/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"3fr 2fr",gap:12}}>
            <Panel title="ACCOUNTS BY INBOX MANAGER">
              <ResponsiveContainer width="100%" height={270}><BarChart data={[...od.inboxManagers].filter(m=>m.accounts>0).sort((a,b)=>b.accounts-a.accounts)} layout="vertical" margin={{left:10,right:75}}><CartesianGrid strokeDasharray="3 3" stroke={C.gridLine} horizontal={false}/><XAxis type="number" tick={{fill:C.textMuted,fontSize:9}} tickFormatter={v=>fmt(v)}/><YAxis dataKey="manager" type="category" tick={{fill:C.textSecondary,fontSize:10}} width={70}/><Tooltip content={<CustomTip/>} formatter={v=>[v.toLocaleString(),"Accounts"]}/><Bar dataKey="accounts" radius={[0,4,4,0]} label={{position:"right",fill:C.textMuted,fontSize:9,formatter:v=>fmtFull(v)}}>{[...od.inboxManagers].filter(m=>m.accounts>0).sort((a,b)=>b.accounts-a.accounts).map((r,i)=><Cell key={i} fill={r.color}/>)}</Bar></BarChart></ResponsiveContainer>
            </Panel>
            <Panel title="SHARE DISTRIBUTION">
              <ResponsiveContainer width="100%" height={270}><PieChart><Pie data={od.inboxManagers.filter(m=>m.accounts>0)} cx="50%" cy="50%" innerRadius={50} outerRadius={95} dataKey="accounts" nameKey="manager" paddingAngle={2}>{od.inboxManagers.filter(m=>m.accounts>0).map((r,i)=><Cell key={i} fill={r.color} stroke="transparent"/>)}</Pie><Tooltip content={<CustomTip/>} formatter={(v,n)=>[v.toLocaleString()+" accounts",n]}/><Legend iconSize={9} wrapperStyle={{fontSize:10,color:C.textLabel}}/></PieChart></ResponsiveContainer>
            </Panel>
          </div>
        </div>)}

        {/* ── EMAIL TYPES ── */}
        {inboxTab==="Email Types"&&(<div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
            <MiniCard icon="📧" label="Email Types" value={String(od.emailTypes.filter(e=>e.accounts>0).length)} color={oc.primary}/>
            <MiniCard icon="📊" label="Total Accounts" value={fmtFull(totalETAccts)} color="#0891b2"/>
            <MiniCard icon="🔝" label="Top Type" value={topET.type} color="#d97706" sub={`${fmtFull(topET.accounts)} accounts`}/>
            <MiniCard icon="🌐" label="Provider" value={od.emailProviders.filter(p=>p.accounts>0).map(p=>p.provider).join(" + ")||"—"} color="#7c3aed"/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <Panel title="EMAIL TYPE BREAKDOWN">
              <ResponsiveContainer width="100%" height={300}><BarChart data={[...od.emailTypes].filter(e=>e.accounts>0).sort((a,b)=>b.accounts-a.accounts)} layout="vertical" margin={{left:10,right:75}}><CartesianGrid strokeDasharray="3 3" stroke={C.gridLine} horizontal={false}/><XAxis type="number" tick={{fill:C.textMuted,fontSize:9}} tickFormatter={v=>fmt(v)}/><YAxis dataKey="type" type="category" tick={{fill:C.textSecondary,fontSize:9}} width={110}/><Tooltip content={<CustomTip/>} formatter={v=>[v.toLocaleString(),"Accounts"]}/><Bar dataKey="accounts" radius={[0,4,4,0]} label={{position:"right",fill:C.textMuted,fontSize:9,formatter:v=>fmt(v)}}>{[...od.emailTypes].filter(e=>e.accounts>0).sort((a,b)=>b.accounts-a.accounts).map((r,i)=><Cell key={i} fill={r.color}/>)}</Bar></BarChart></ResponsiveContainer>
            </Panel>
            <Panel title="EMAIL PROVIDER">
              <div style={{display:"flex",flexDirection:"column",gap:14,paddingTop:6}}>
                {od.emailProviders.filter(p=>p.accounts>0).map((p,i)=>(
                  <div key={i} style={{background:`${p.color}0f`,border:`1px solid ${p.color}44`,borderRadius:14,padding:"20px 22px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><span style={{fontSize:16,fontWeight:800,color:p.color}}>{p.provider}</span><span style={{fontSize:24,fontWeight:800,color:C.textPrimary}}>{fmtFull(p.accounts)}</span></div>
                    <div style={{height:8,background:"#e2e8f0",borderRadius:99,marginBottom:8}}><div style={{width:"100%",height:"100%",background:p.color,borderRadius:99}}/></div>
                    <div style={{fontSize:11,color:C.textMuted}}>{fmtFull(p.domains)} domains</div>
                  </div>
                ))}
                {od.emailProviders.filter(p=>p.accounts>0).length===0&&<div style={{color:C.textMuted,fontSize:12,padding:"20px 0",textAlign:"center"}}>No provider data</div>}
              </div>
            </Panel>
          </div>
          <Panel title="EMAIL TYPE TABLE">
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><thead><tr>{["Type","Accounts","% Share","Domains","Bar"].map(h=><th key={h} style={{textAlign:"left",padding:"9px 12px",borderBottom:`1px solid ${C.cardBorder}`,color:C.textLabel,fontSize:10,fontWeight:700,textTransform:"uppercase",background:C.tableHead}}>{h}</th>)}</tr></thead><tbody>
              {(()=>{const total=od.emailTypes.reduce((s,r)=>s+r.accounts,0);return[...od.emailTypes].sort((a,b)=>b.accounts-a.accounts).map((r,i)=><tr key={i} style={{borderBottom:`1px solid ${C.tableBorder}`,background:i%2?C.tableAlt:C.card,opacity:r.accounts>0?1:0.5}}><td style={{padding:"9px 12px",fontWeight:700,color:r.accounts>0?r.color:C.textMuted}}>{r.type}</td><td style={{padding:"9px 12px",color:C.textPrimary,fontWeight:700}}>{fmtFull(r.accounts)}</td><td style={{padding:"9px 12px",color:C.textSecondary}}>{total>0?((r.accounts/total)*100).toFixed(1):0}%</td><td style={{padding:"9px 12px",color:C.textMuted}}>{fmtFull(r.domains)}</td><td style={{padding:"9px 12px",minWidth:120}}><div style={{height:5,background:"#e2e8f0",borderRadius:99}}><div style={{width:total>0?`${(r.accounts/total)*100}%`:"0%",height:"100%",background:r.color,borderRadius:99,maxWidth:"100%"}}/></div></td></tr>);})()}
            </tbody></table>
          </Panel>
        </div>)}

        {/* ── GROUPS ── */}
        {inboxTab==="Groups"&&(<div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
            <MiniCard icon="🅰️" label="Group A" value={fmtFull(od.groups[0]?.accounts||0)} color="#2563eb" sub={`${fmtFull(od.groups[0]?.domains||0)} domains`}/>
            <MiniCard icon="🅱️" label="Group B" value={fmtFull(od.groups[1]?.accounts||0)} color="#db2777" sub={`${fmtFull(od.groups[1]?.domains||0)} domains`}/>
            <MiniCard icon="📊" label="Combined" value={fmtFull((od.groups[0]?.accounts||0)+(od.groups[1]?.accounts||0))} color="#16a34a"/>
            <MiniCard icon="🏷️" label="Tag Values" value={String((od.groups[0]?.tags||0)+(od.groups[1]?.tags||0))} color="#d97706"/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:12}}>
            <Panel title="GROUP A vs GROUP B">
              <ResponsiveContainer width="100%" height={220}>
                <BarChart data={od.groups.filter(g=>g.accounts>0||g.tags>0)} barGap={4} margin={{left:10,right:20}}>
                  <CartesianGrid strokeDasharray="3 3" stroke={C.gridLine}/>
                  <XAxis dataKey="group" tick={{fill:C.textMuted,fontSize:11}}/>
                  <YAxis tick={{fill:C.textMuted,fontSize:9}} tickFormatter={v=>fmt(v)}/>
                  <Tooltip content={<CustomTip/>}/>
                  <Legend iconSize={8} wrapperStyle={{fontSize:10,color:C.textLabel}}/>
                  <Bar dataKey="accounts" name="Accounts" fill="#2563eb" radius={[4,4,0,0]} barSize={40}/>
                  <Bar dataKey="domains" name="Domains" fill="#db2777" radius={[4,4,0,0]} barSize={40}/>
                </BarChart>
              </ResponsiveContainer>
            </Panel>
            <Panel title="GROUP BREAKDOWN">
              <div style={{display:"flex",flexDirection:"column",gap:14,paddingTop:6}}>
                {od.groups.map((g,i)=>(
                  <div key={i} style={{background:`${g.color}0f`,border:`1px solid ${g.color}44`,borderRadius:12,padding:"16px 18px"}}>
                    <div style={{fontSize:15,fontWeight:800,color:g.color,marginBottom:8}}>{g.group}</div>
                    <div style={{fontSize:24,fontWeight:800,color:C.textPrimary}}>{fmtFull(g.accounts)}</div>
                    <div style={{fontSize:10,color:C.textMuted,marginTop:2}}>accounts</div>
                    <div style={{marginTop:8,fontSize:12,color:C.textSecondary}}>{fmtFull(g.domains)} domains · {g.tags} tags</div>
                  </div>
                ))}
              </div>
            </Panel>
          </div>
        </div>)}

        {/* ── EMAIL SERVICE PROVIDER ── */}
        {inboxTab==="Email Service Provider"&&(<div style={{display:"flex",flexDirection:"column",gap:14}}>
          {(()=>{
            const activeProviders=od.emailProviders.filter(p=>p.accounts>0);
            const totalESP=od.emailProviders.reduce((s,r)=>s+r.accounts,0);
            const topESP=activeProviders[0]||{provider:"—",accounts:0};
            return(<>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
                <MiniCard icon="📡" label="Providers Active" value={String(activeProviders.length)} color={oc.primary}/>
                <MiniCard icon="📊" label="Total Accounts" value={fmtFull(totalESP)} color="#0891b2"/>
                <MiniCard icon="🏆" label="Top Provider" value={topESP.provider} color="#d97706" sub={`${fmtFull(topESP.accounts)} accounts`}/>
                <MiniCard icon="🌐" label="Total Domains" value={fmtFull(od.emailProviders.reduce((s,r)=>s+r.domains,0))} color="#7c3aed"/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                {od.emailProviders.map((p,i)=>(
                  <div key={i} style={{background:p.accounts>0?`${p.color}0f`:"#f8fafc",border:`1px solid ${p.accounts>0?p.color+"44":C.cardBorder}`,borderRadius:16,padding:"24px 26px",opacity:p.accounts>0?1:0.6}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                      <span style={{fontSize:20,fontWeight:800,color:p.accounts>0?p.color:C.textMuted}}>{p.provider}</span>
                      <span style={{fontSize:12,color:C.textMuted,background:"#f1f5f9",borderRadius:99,padding:"3px 10px",fontWeight:600}}>{totalESP>0?((p.accounts/totalESP)*100).toFixed(1)+"%":"0%"}</span>
                    </div>
                    <div style={{fontSize:32,fontWeight:800,color:p.accounts>0?C.textPrimary:C.textMuted,marginBottom:4}}>{fmtFull(p.accounts)}</div>
                    <div style={{fontSize:11,color:C.textMuted,marginBottom:12}}>accounts</div>
                    <div style={{height:8,background:"#e2e8f0",borderRadius:99,marginBottom:10}}>
                      <div style={{width:totalESP>0?`${(p.accounts/totalESP)*100}%`:"0%",height:"100%",background:p.color,borderRadius:99,transition:"width 0.4s"}}/>
                    </div>
                    <div style={{display:"flex",gap:16}}>
                      <div><div style={{fontSize:13,fontWeight:700,color:p.accounts>0?p.color:C.textMuted}}>{fmtFull(p.domains)}</div><div style={{fontSize:10,color:C.textMuted}}>domains</div></div>
                      <div><div style={{fontSize:13,fontWeight:700,color:p.accounts>0?p.color:C.textMuted}}>{p.tags||0}</div><div style={{fontSize:10,color:C.textMuted}}>tags</div></div>
                    </div>
                  </div>
                ))}
              </div>
              <Panel title="PROVIDER COMPARISON TABLE">
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead><tr>{["Provider","Accounts","% Share","Domains","Tags","Bar"].map(h=><th key={h} style={{textAlign:"left",padding:"9px 12px",borderBottom:`1px solid ${C.cardBorder}`,color:C.textLabel,fontSize:10,fontWeight:700,textTransform:"uppercase",background:C.tableHead}}>{h}</th>)}</tr></thead>
                  <tbody>
                    {[...od.emailProviders].sort((a,b)=>b.accounts-a.accounts).map((r,i)=>(
                      <tr key={i} style={{borderBottom:`1px solid ${C.tableBorder}`,background:i%2?C.tableAlt:C.card}}>
                        <td style={{padding:"9px 12px",fontWeight:700,color:r.accounts>0?r.color:C.textMuted}}>{r.provider}</td>
                        <td style={{padding:"9px 12px",color:C.textPrimary,fontWeight:700}}>{fmtFull(r.accounts)}</td>
                        <td style={{padding:"9px 12px",color:C.textSecondary}}>{totalESP>0?((r.accounts/totalESP)*100).toFixed(1):0}%</td>
                        <td style={{padding:"9px 12px",color:C.textMuted}}>{fmtFull(r.domains)}</td>
                        <td style={{padding:"9px 12px",color:C.textMuted}}>{r.tags||0}</td>
                        <td style={{padding:"9px 12px",minWidth:120}}><div style={{height:5,background:"#e2e8f0",borderRadius:99}}><div style={{width:totalESP>0?`${(r.accounts/totalESP)*100}%`:"0%",height:"100%",background:r.color,borderRadius:99,maxWidth:"100%"}}/></div></td>
                      </tr>
                    ))}
                    <tr style={{borderTop:`2px solid ${C.cardBorder}`,background:C.tableHead}}>
                      <td style={{padding:"9px 12px",fontWeight:800,color:C.textPrimary}}>Total</td>
                      <td style={{padding:"9px 12px",color:oc.primary,fontWeight:800}}>{fmtFull(totalESP)}</td>
                      <td style={{padding:"9px 12px",color:C.textSecondary}}>100%</td>
                      <td style={{padding:"9px 12px",color:"#7c3aed",fontWeight:800}}>{fmtFull(od.emailProviders.reduce((s,r)=>s+r.domains,0))}</td>
                      <td style={{padding:"9px 12px",color:"#d97706",fontWeight:800}}>{od.emailProviders.reduce((s,r)=>s+(r.tags||0),0)}</td>
                      <td/>
                    </tr>
                  </tbody>
                </table>
              </Panel>
            </>);
          })()}
        </div>)}
      </div>
    );
  };

  return(
    <div style={{fontFamily:"system-ui,sans-serif",background:C.bg,minHeight:"100vh",color:C.textPrimary,display:"flex",flexDirection:"row"}}>
      <LeftSidebar section={section} setSection={setSection} collapsed={collapsed} setCollapsed={setCollapsed}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>
        <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
          {section==="overview"&&<div style={{flex:1,overflowY:"auto",padding:"20px 24px"}}>{renderOverview()}</div>}

          {section==="business"&&<div style={{flex:1,overflowY:"auto",padding:"20px 24px"}}>{renderBusiness()}</div>}
          {section==="cm"&&<div style={{flex:1,display:"flex",overflow:"hidden"}}><div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",padding:"16px 20px",gap:12}}>{renderCM()}</div></div>}
          {section==="inbox"&&<div style={{flex:1,overflowY:"auto",padding:"20px 24px"}}>{renderInbox()}</div>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
