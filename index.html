        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Panel title="ACCOUNT STATUS — PIE"><ResponsiveContainer width="100%" height={260}><PieChart><Pie data={ACCOUNT_STATUS} cx="50%" cy="50%" innerRadius={55} outerRadius={100} dataKey="accounts" paddingAngle={3} nameKey="status">{ACCOUNT_STATUS.map((r,i)=><Cell key={i} fill={r.color} stroke="transparent"/>)}</Pie><Tooltip content={<CustomTip/>} formatter={(v,n)=>[v.toLocaleString()+" accounts",n]}/><Legend iconSize={10} wrapperStyle={{fontSize:11,color:"#64748b"}}/></PieChart></ResponsiveContainer></Panel>
          <Panel title="EMAIL TYPE DISTRIBUTION"><ResponsiveContainer width="100%" height={260}><PieChart><Pie data={EMAIL_TYPES} cx="50%" cy="50%" innerRadius={55} outerRadius={100} dataKey="accounts" paddingAngle={3} nameKey="type">{EMAIL_TYPES.map((r,i)=><Cell key={i} fill={r.color} stroke="transparent"/>)}</Pie><Tooltip content={<CustomTip/>} formatter={(v,n)=>[v.toLocaleString()+" accounts",n]}/><Legend iconSize={10} wrapperStyle={{fontSize:11,color:"#64748b"}}/></PieChart></ResponsiveContainer></Panel>
        </div>
        <Panel title="EMAIL TYPE FULL BREAKDOWN"><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><thead><tr>{["Type","Accounts","Share","Bar"].map(h=><th key={h} style={{textAlign:"left",padding:"9px 12px",borderBottom:"1px solid #1e3a5f",color:"#475569",fontSize:10,fontWeight:700,textTransform:"uppercase"}}>{h}</th>)}</tr></thead><tbody>{[...EMAIL_TYPES].sort((a,b)=>b.accounts-a.accounts).map((r,i)=>(<tr key={i} style={{borderBottom:"1px solid #0f1e35",background:i%2?"#0a1628":"transparent"}}><td style={{padding:"9px 12px",color:"#e2e8f0",fontWeight:600}}>{r.type}</td><td style={{padding:"9px 12px",color:r.color,fontWeight:700}}>{fmtFull(r.accounts)}</td><td style={{padding:"9px 12px",color:"#64748b"}}>{r.pct}%</td><td style={{padding:"9px 12px",minWidth:120}}><div style={{height:6,background:"#1e3a5f",borderRadius:99}}><div style={{width:`${r.pct/40*100}%`,height:"100%",background:r.color,borderRadius:99,maxWidth:"100%"}}/></div></td></tr>))}</tbody></table></Panel>
      </div>)}
      {inboxTab==="Campaign Managers"&&(<div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
          <MiniCard icon="👥" label="Total CM Accounts" value={fmtFull(totalCMAccounts)} color="#818cf8"/>
          <MiniCard icon="📧" label="Total Daily Emails" value={fmt(totalDailyEmails)} color="#22d3ee"/>
          <MiniCard icon="🏆" label="Largest CM" value="Ido" color="#f59e0b" sub="32,837 accounts · 23.56%"/>
          <MiniCard icon="📈" label="Most Daily Volume" value="Eyver" color="#10b981" sub="265,960 emails/day"/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:12}}>
          <Panel title="ACCOUNTS BY CM"><ResponsiveContainer width="100%" height={260}><BarChart data={[...CM_INBOX].sort((a,b)=>b.accounts-a.accounts)} layout="vertical" margin={{left:10,right:70}}><CartesianGrid strokeDasharray="3 3" stroke="#1e3a5f" horizontal={false}/><XAxis type="number" tick={{fill:"#475569",fontSize:9}} tickFormatter={v=>fmt(v)}/><YAxis dataKey="cm" type="category" tick={{fill:"#94a3b8",fontSize:10}} width={65}/><Tooltip content={<CustomTip/>} formatter={v=>[v.toLocaleString(),"Accounts"]}/><Bar dataKey="accounts" radius={[0,4,4,0]} label={{position:"right",fill:"#64748b",fontSize:9,formatter:v=>fmtFull(v)}}>{CM_INBOX.map((_,i)=><Cell key={i} fill={CM_COLORS[i%CM_COLORS.length]}/>)}</Bar></BarChart></ResponsiveContainer></Panel>
          <Panel title="DAILY EMAIL VOLUME"><ResponsiveContainer width="100%" height={260}><BarChart data={[...CM_INBOX].sort((a,b)=>b.dailyEmails-a.dailyEmails)} layout="vertical" margin={{left:10,right:55}}><CartesianGrid strokeDasharray="3 3" stroke="#1e3a5f" horizontal={false}/><XAxis type="number" tick={{fill:"#475569",fontSize:9}} tickFormatter={v=>fmt(v)}/><YAxis dataKey="cm" type="category" tick={{fill:"#94a3b8",fontSize:10}} width={60}/><Tooltip content={<CustomTip/>} formatter={v=>[v.toLocaleString(),"Daily Emails"]}/><Bar dataKey="dailyEmails" radius={[0,4,4,0]}>{CM_INBOX.map((_,i)=><Cell key={i} fill={CM_COLORS[i%CM_COLORS.length]}/>)}</Bar></BarChart></ResponsiveContainer></Panel>
        </div>
        <Panel title="CM FULL TABLE"><div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><thead><tr>{["CM","Accounts","%","Daily Emails","Group A","Group B","Group Total"].map(h=><th key={h} style={{textAlign:"left",padding:"9px 12px",borderBottom:"1px solid #1e3a5f",color:"#475569",fontSize:10,fontWeight:700,textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead><tbody>{[...CM_INBOX].sort((a,b)=>b.accounts-a.accounts).map((r,i)=>(<tr key={i} style={{borderBottom:"1px solid #0f1e35",background:i%2?"#0a1628":"transparent"}}><td style={{padding:"9px 12px",fontWeight:700,color:"#e2e8f0"}}>{r.cm}</td><td style={{padding:"9px 12px",color:CM_COLORS[i%CM_COLORS.length],fontWeight:700}}>{fmtFull(r.accounts)}</td><td style={{padding:"9px 12px",color:"#64748b"}}>{r.pct}%</td><td style={{padding:"9px 12px",color:"#22d3ee"}}>{fmtFull(r.dailyEmails)}</td><td style={{padding:"9px 12px",color:"#818cf8"}}>{r.groupA.toLocaleString()}</td><td style={{padding:"9px 12px",color:"#f472b6"}}>{r.groupB.toLocaleString()}</td><td style={{padding:"9px 12px",color:"#f59e0b",fontWeight:700}}>{(r.groupA+r.groupB).toLocaleString()}</td></tr>))}<tr style={{borderTop:"2px solid #1e3a5f",background:"#0d1b2e"}}><td style={{padding:"9px 12px",fontWeight:800,color:"#f1f5f9"}}>Grand Total</td><td style={{padding:"9px 12px",color:"#818cf8",fontWeight:800}}>{fmtFull(totalCMAccounts)}</td><td style={{padding:"9px 12px",color:"#64748b"}}>100%</td><td style={{padding:"9px 12px",color:"#22d3ee",fontWeight:800}}>{fmtFull(totalDailyEmails)}</td><td style={{padding:"9px 12px",color:"#818cf8",fontWeight:800}}>{CM_INBOX.reduce((s,r)=>s+r.groupA,0).toLocaleString()}</td><td style={{padding:"9px 12px",color:"#f472b6",fontWeight:800}}>{CM_INBOX.reduce((s,r)=>s+r.groupB,0).toLocaleString()}</td><td style={{padding:"9px 12px",color:"#f59e0b",fontWeight:800}}>{CM_INBOX.reduce((s,r)=>s+r.groupA+r.groupB,0).toLocaleString()}</td></tr></tbody></table></div></Panel>
      </div>)}
      {inboxTab==="Groups"&&(<div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
          <MiniCard icon="🏢" label="Total Groups" value="9" color="#818cf8"/>
          <MiniCard icon="🅰️" label="Group A Total" value={fmtFull(42648)} color="#6366f1"/>
          <MiniCard icon="🅱️" label="Group B Total" value={fmtFull(38926)} color="#f472b6"/>
          <MiniCard icon="📊" label="Combined Total" value={fmtFull(81574)} color="#10b981"/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:12}}>
          <Panel title="GROUP A vs GROUP B"><ResponsiveContainer width="100%" height={280}><BarChart data={[...GROUPS].sort((a,b)=>b.total-a.total)} barGap={4}><CartesianGrid strokeDasharray="3 3" stroke="#1e3a5f"/><XAxis dataKey="group" tick={{fill:"#475569",fontSize:9}} interval={0} angle={-20} textAnchor="end" height={50}/><YAxis tick={{fill:"#475569",fontSize:9}}/><Tooltip content={<CustomTip/>}/><Legend iconSize={8} wrapperStyle={{fontSize:10,color:"#64748b"}}/><Bar dataKey="A" name="Group A" fill="#6366f1" radius={[3,3,0,0]} barSize={18}/><Bar dataKey="B" name="Group B" fill="#f472b6" radius={[3,3,0,0]} barSize={18}/></BarChart></ResponsiveContainer></Panel>
          <Panel title="GROUP TOTALS"><div style={{display:"flex",flexDirection:"column",gap:7}}>{[...GROUPS].sort((a,b)=>b.total-a.total).map((g,i)=>{const pct=(g.total/14060)*100;return(<div key={g.group}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:11,color:"#cbd5e1",fontWeight:600}}>{g.group}</span><span style={{fontSize:11,fontWeight:800,color:"#f59e0b"}}>{fmtFull(g.total)}</span></div><div style={{height:4,background:"#1e3a5f",borderRadius:99}}><div style={{width:`${pct}%`,height:"100%",background:"linear-gradient(90deg,#6366f1,#f472b6)",borderRadius:99}}/></div></div>);})}</div></Panel>
        </div>
      </div>)}
      {inboxTab==="Inbox Managers"&&(<div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
          <MiniCard icon="🧑‍💼" label="Inbox Managers" value="8" color="#818cf8"/>
          <MiniCard icon="📬" label="Total Managed" value={fmtFull(88774)} color="#10b981"/>
          <MiniCard icon="🏆" label="Largest Manager" value="Norman" color="#f59e0b" sub="24,908 · 28.06%"/>
          <MiniCard icon="📊" label="Avg per Manager" value={fmtFull(Math.round(88774/8))} color="#22d3ee" sub="accounts"/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"3fr 2fr",gap:12}}>
          <Panel title="ACCOUNTS BY INBOX MANAGER"><ResponsiveContainer width="100%" height={270}><BarChart data={[...INBOX_MANAGERS].sort((a,b)=>b.accounts-a.accounts)} layout="vertical" margin={{left:10,right:70}}><CartesianGrid strokeDasharray="3 3" stroke="#1e3a5f" horizontal={false}/><XAxis type="number" tick={{fill:"#475569",fontSize:9}} tickFormatter={v=>fmt(v)}/><YAxis dataKey="manager" type="category" tick={{fill:"#94a3b8",fontSize:10}} width={68}/><Tooltip content={<CustomTip/>} formatter={v=>[v.toLocaleString(),"Accounts"]}/><Bar dataKey="accounts" radius={[0,4,4,0]} label={{position:"right",fill:"#64748b",fontSize:9,formatter:v=>fmtFull(v)}}>{INBOX_MANAGERS.map((r,i)=><Cell key={i} fill={r.color}/>)}</Bar></BarChart></ResponsiveContainer></Panel>
          <Panel title="SHARE DISTRIBUTION"><ResponsiveContainer width="100%" height={270}><PieChart><Pie data={INBOX_MANAGERS} cx="50%" cy="50%" innerRadius={50} outerRadius={95} dataKey="accounts" nameKey="manager" paddingAngle={2}>{INBOX_MANAGERS.map((r,i)=><Cell key={i} fill={r.color} stroke="transparent"/>)}</Pie><Tooltip content={<CustomTip/>} formatter={(v,n)=>[v.toLocaleString()+" accounts",n]}/><Legend iconSize={9} wrapperStyle={{fontSize:10,color:"#64748b"}}/></PieChart></ResponsiveContainer></Panel>
        </div>
      </div>)}
      {inboxTab==="Email Types"&&(<div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
          <MiniCard icon="📧" label="Email Types" value="8" color="#818cf8"/>
          <MiniCard icon="🔝" label="Top Type" value="Reseller" color="#6366f1" sub="111,206 · 38.56%"/>
          <MiniCard icon="🌐" label="Google Accounts" value={fmtFull(149058)} color="#4285f4" sub="51.69%"/>
          <MiniCard icon="🪟" label="Outlook Accounts" value={fmtFull(139307)} color="#0078d4" sub="48.31%"/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Panel title="EMAIL TYPE BREAKDOWN"><ResponsiveContainer width="100%" height={280}><BarChart data={[...EMAIL_TYPES].sort((a,b)=>b.accounts-a.accounts)} layout="vertical" margin={{left:10,right:65}}><CartesianGrid strokeDasharray="3 3" stroke="#1e3a5f" horizontal={false}/><XAxis type="number" tick={{fill:"#475569",fontSize:9}} tickFormatter={v=>fmt(v)}/><YAxis dataKey="type" type="category" tick={{fill:"#94a3b8",fontSize:9}} width={90}/><Tooltip content={<CustomTip/>} formatter={v=>[v.toLocaleString(),"Accounts"]}/><Bar dataKey="accounts" radius={[0,4,4,0]} label={{position:"right",fill:"#64748b",fontSize:9,formatter:v=>fmt(v)}}>{EMAIL_TYPES.map((r,i)=><Cell key={i} fill={r.color}/>)}</Bar></BarChart></ResponsiveContainer></Panel>
          <Panel title="EMAIL PROVIDER COMPARISON"><div style={{display:"flex",flexDirection:"column",gap:16,paddingTop:8}}>{EMAIL_PROVIDERS.map((p,i)=>(<div key={i} style={{background:`${p.color}15`,border:`1px solid ${p.color}44`,borderRadius:14,padding:"20px 22px"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><span style={{fontSize:16,fontWeight:800,color:p.color}}>{p.provider}</span><span style={{fontSize:24,fontWeight:800,color:"#f1f5f9"}}>{p.pct}%</span></div><div style={{height:8,background:"#1e3a5f",borderRadius:99,marginBottom:10}}><div style={{width:`${p.pct}%`,height:"100%",background:p.color,borderRadius:99}}/></div><div style={{fontSize:22,fontWeight:800,color:p.color}}>{fmtFull(p.accounts)}</div><div style={{fontSize:11,color:"#475569"}}>total accounts</div></div>))}</div></Panel>
        </div>
      </div>)}
      {/* #2: Domains tab */}
      {inboxTab==="Domains"&&(<div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
          <MiniCard icon="🌐" label="Total Domains" value={fmtFull(DOMAIN_DATA.total)} color="#818cf8"/>
          <MiniCard icon="✅" label="Used Domains" value={fmtFull(DOMAIN_DATA.used)} color="#10b981" sub={`${((DOMAIN_DATA.used/DOMAIN_DATA.total)*100).toFixed(1)}% utilization`}/>
          <MiniCard icon="🔒" label="Unused Domains" value={fmtFull(DOMAIN_DATA.unused)} color="#f59e0b" sub="Available capacity"/>
          <MiniCard icon="🏢" label="Registrar Accounts" value={`${DOMAIN_DATA.byRegistrar.reduce((s,r)=>s+r.accounts,0)}`} color="#a78bfa" sub="Across 3 registrars"/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:12}}>
          <Panel title="DOMAIN UTILIZATION">
            <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:14}}>
              {[{label:"Used",value:DOMAIN_DATA.used,color:"#10b981"},{label:"Unused",value:DOMAIN_DATA.unused,color:"#f59e0b"}].map((r,i)=>(
                <div key={i}><div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:12,color:"#cbd5e1",fontWeight:600}}>{r.label}</span><span style={{fontSize:12,fontWeight:800,color:r.color}}>{fmtFull(r.value)} ({((r.value/DOMAIN_DATA.total)*100).toFixed(1)}%)</span></div><div style={{height:8,background:"#1e3a5f",borderRadius:99}}><div style={{width:`${(r.value/DOMAIN_DATA.total)*100}%`,height:"100%",background:r.color,borderRadius:99}}/></div></div>
              ))}
            </div>
            <ResponsiveContainer width="100%" height={180}>
              <BarChart data={DOMAIN_DATA.byTLD.filter(d=>d.count>0).sort((a,b)=>b.count-a.count)} layout="vertical" margin={{left:10,right:65}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#1e3a5f" horizontal={false}/>
                <XAxis type="number" tick={{fill:"#475569",fontSize:9}} tickFormatter={v=>fmt(v)}/>
                <YAxis dataKey="tld" type="category" tick={{fill:"#94a3b8",fontSize:10}} width={45}/>
                <Tooltip content={<CustomTip/>} formatter={v=>[v.toLocaleString(),"Domains"]}/>
                <Bar dataKey="count" radius={[0,4,4,0]} label={{position:"right",fill:"#64748b",fontSize:9,formatter:v=>fmtFull(v)}}>{DOMAIN_DATA.byTLD.filter(d=>d.count>0).sort((a,b)=>b.count-a.count).map((r,i)=><Cell key={i} fill={r.color}/>)}</Bar>
              </BarChart>
            </ResponsiveContainer>
          </Panel>
          <Panel title="BY REGISTRAR">
            <div style={{display:"flex",flexDirection:"column",gap:14,paddingTop:4}}>
              {DOMAIN_DATA.byRegistrar.map((r,i)=>(
                <div key={i} style={{background:`${r.color}15`,border:`1px solid ${r.color}44`,borderRadius:12,padding:"14px 16px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><span style={{fontSize:14,fontWeight:800,color:r.color}}>{r.registrar}</span><span style={{fontSize:11,color:"#64748b"}}>{r.accounts} accounts</span></div>
                  <div style={{fontSize:26,fontWeight:800,color:"#f1f5f9",marginBottom:6}}>{fmtFull(r.count)}</div>
                  <div style={{height:6,background:"#1e3a5f",borderRadius:99}}><div style={{width:`${(r.count/DOMAIN_DATA.total)*100}%`,height:"100%",background:r.color,borderRadius:99}}/></div>
                  <div style={{fontSize:10,color:"#475569",marginTop:6}}>{((r.count/DOMAIN_DATA.total)*100).toFixed(1)}% of total</div>
                </div>
              ))}
            </div>
          </Panel>
        </div>
        <Panel title="DOMAIN BREAKDOWN TABLE">
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr>{["TLD","Count","Share","Bar"].map(h=><th key={h} style={{textAlign:"left",padding:"9px 12px",borderBottom:"1px solid #1e3a5f",color:"#475569",fontSize:10,fontWeight:700,textTransform:"uppercase"}}>{h}</th>)}</tr></thead>
            <tbody>{[...DOMAIN_DATA.byTLD].sort((a,b)=>b.count-a.count).map((r,i)=>(<tr key={i} style={{borderBottom:"1px solid #0f1e35",background:i%2?"#0a1628":"transparent"}}>
              <td style={{padding:"9px 12px",color:"#e2e8f0",fontWeight:600}}>{r.tld}</td>
              <td style={{padding:"9px 12px",color:r.color,fontWeight:700}}>{fmtFull(r.count)}</td>
              <td style={{padding:"9px 12px",color:"#64748b"}}>{r.count>0?((r.count/DOMAIN_DATA.total)*100).toFixed(2)+"%":"—"}</td>
              <td style={{padding:"9px 12px",minWidth:120}}><div style={{height:6,background:"#1e3a5f",borderRadius:99}}><div style={{width:`${(r.count/51389)*100}%`,height:"100%",background:r.color,borderRadius:99,maxWidth:"100%"}}/></div></td>
            </tr>))}</tbody>
          </table>
        </Panel>
      </div>)}
    </div>
  );

  return(
    <div style={{fontFamily:"system-ui,sans-serif",background:"linear-gradient(135deg,#060818,#0d1117,#0a0f1e)",minHeight:"100vh",color:"#e2e8f0",display:"flex",flexDirection:"column"}}>
      <div style={{background:"linear-gradient(90deg,#0d1b2e,#0a1628)",borderBottom:"1px solid rgba(255,255,255,0.07)",padding:"0 24px",display:"flex",alignItems:"center",height:54,flexShrink:0,zIndex:20}}>
        {/* #9: More blue color for title */}
        <div style={{fontWeight:900,fontSize:26,background:"linear-gradient(90deg,#60a5fa,#3b82f6,#2563eb)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginRight:32,letterSpacing:"-0.5px"}}>Renaissance Portal</div>
        <nav style={{display:"flex",gap:3,flex:1}}>
          {TOP_SECTIONS.map(({key,icon,label})=>(
            <button key={key} onClick={()=>setSection(key)} style={{background:section===key?"linear-gradient(135deg,#6366f130,#818cf820)":"transparent",border:section===key?"1px solid #6366f166":"1px solid transparent",borderRadius:10,padding:"6px 18px",cursor:"pointer",display:"flex",alignItems:"center",gap:7,color:section===key?"#a5b4fc":"#475569",fontWeight:section===key?700:500,fontSize:13,outline:"none"}}>
              <span>{icon}</span>{label}
            </button>
          ))}
        </nav>
        <div style={{background:"rgba(16,185,129,0.15)",border:"1px solid rgba(16,185,129,0.3)",borderRadius:20,padding:"4px 12px",fontSize:11,color:"#10b981",display:"flex",alignItems:"center",gap:6}}>
          <span style={{width:6,height:6,background:"#10b981",borderRadius:"50%",display:"inline-block"}}/>Updated Jan '26
        </div>
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {section==="overview"&&<div style={{flex:1,overflowY:"auto",padding:"20px 24px"}}>{renderOverview()}</div>}
        {section==="business"&&<div style={{flex:1,overflowY:"auto",padding:"20px 24px"}}>{renderBusiness()}</div>}
        {section==="cm"&&<div style={{flex:1,display:"flex",overflow:"hidden"}}><div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",padding:"16px 20px",gap:12}}>{renderCM()}</div></div>}
        {section==="inbox"&&<div style={{flex:1,overflowY:"auto",padding:"20px 24px"}}>{renderInbox()}</div>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
