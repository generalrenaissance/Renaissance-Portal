              <div style={{marginBottom:14}}>
                {[{label:'Used',value:DOMAIN_DATA.used,color:T.success},{label:'Unused',value:DOMAIN_DATA.unused,color:T.warning}].map((r,i)=>(
                  <div key={i} style={{marginBottom:10}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                      <span style={{fontSize:11,color:T.slate300,fontWeight:600}}>{r.label}</span>
                      <span style={{fontSize:11,fontWeight:700,color:r.color}}>{fmtFull(r.value)} ({((r.value/DOMAIN_DATA.total)*100).toFixed(1)}%)</span>
                    </div>
                    <div style={{height:5,background:T.slate800,borderRadius:99}}>
                      <div style={{width:`${(r.value/DOMAIN_DATA.total)*100}%`,height:'100%',background:r.color,borderRadius:99,opacity:0.8}}/>
                    </div>
                  </div>
                ))}
              </div>
              <ResponsiveContainer width="100%" height={160}>
                <BarChart data={DOMAIN_DATA.byTLD.filter(d=>d.count>0).sort((a,b)=>b.count-a.count)} layout="vertical" margin={{left:10,right:60}}>
                  {CHART_GRID}<XAxis type="number" tick={AXIS_STYLE} tickFormatter={v=>fmt(v)}/><YAxis dataKey="tld" type="category" tick={{...AXIS_STYLE,fill:T.slate400}} width={42}/><Tooltip content={<CustomTip/>} formatter={v=>[v.toLocaleString(),'Domains']}/>
                  <Bar dataKey="count" radius={[0,3,3,0]} fill={T.brand} label={{position:'right',fill:T.slate500,fontSize:9,formatter:v=>fmtFull(v)}} opacity={0.8}/>
                </BarChart>
              </ResponsiveContainer>
            </Card>
            <Card>
              <SectionLabel>By registrar</SectionLabel>
              <div style={{display:'flex',flexDirection:'column',gap:12}}>
                {DOMAIN_DATA.byRegistrar.map((r,i)=>(
                  <div key={i} style={{background:'rgba(0,0,0,0.2)',border:`1px solid ${T.border}`,borderRadius:6,padding:'14px 16px'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                      <span style={{fontSize:13,fontWeight:700,color:T.slate200}}>{r.registrar}</span>
                      <span style={{fontSize:10,color:T.slate500}}>{r.accounts} accts</span>
                    </div>
                    <div style={{fontSize:22,fontWeight:800,color:T.slate100,marginBottom:6}}>{fmtFull(r.count)}</div>
                    <div style={{height:4,background:T.slate800,borderRadius:99}}>
                      <div style={{width:`${(r.count/DOMAIN_DATA.total)*100}%`,height:'100%',background:T.brand,borderRadius:99,opacity:0.7}}/>
                    </div>
                    <div style={{fontSize:10,color:T.slate600,marginTop:5}}>{((r.count/DOMAIN_DATA.total)*100).toFixed(1)}% of total</div>
                  </div>
                ))}
              </div>
            </Card>
          </div>
          <Card>
            <SectionLabel>Domain breakdown table</SectionLabel>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
              <thead><tr>{['TLD','Count','Share',''].map(h=><th key={h} style={{textAlign:'left',padding:'8px 12px',borderBottom:`1px solid ${T.border}`,color:T.slate500,fontSize:10,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.07em'}}>{h}</th>)}</tr></thead>
              <tbody>{[...DOMAIN_DATA.byTLD].sort((a,b)=>b.count-a.count).map((r,i)=>(
                <tr key={i} style={{borderBottom:`1px solid rgba(255,255,255,0.025)`,background:i%2?'rgba(255,255,255,0.01)':'transparent'}}>
                  <td style={{padding:'8px 12px',color:T.slate200,fontWeight:600}}>{r.tld}</td>
                  <td style={{padding:'8px 12px',color:T.brandText,fontWeight:700}}>{fmtFull(r.count)}</td>
                  <td style={{padding:'8px 12px',color:T.slate500}}>{r.count>0?((r.count/DOMAIN_DATA.total)*100).toFixed(2)+'%':'—'}</td>
                  <td style={{padding:'8px 12px',minWidth:120}}>
                    <div style={{height:4,background:T.slate800,borderRadius:99}}><div style={{width:`${(r.count/51389)*100}%`,height:'100%',background:T.brand,borderRadius:99,maxWidth:'100%',opacity:0.7}}/></div>
                  </td>
                </tr>
              ))}</tbody>
            </table>
          </Card>
        </>
      )}
    </div>
  );

  return (
    <div style={{fontFamily:"'Inter',system-ui,sans-serif",background:T.bgBase,minHeight:'100vh',color:T.slate200,display:'flex',flexDirection:'column'}}>
      {/* Nav */}
      <div style={{background:T.bgNav,borderBottom:`1px solid ${T.border}`,padding:'0 32px',display:'flex',alignItems:'center',height:52,flexShrink:0,zIndex:20,maxWidth:'none'}}>
        <div style={{fontWeight:800,fontSize:17,color:T.brandText,marginRight:36,letterSpacing:'-0.02em'}}>Renaissance Portal</div>
        <nav style={{display:'flex',gap:1,flex:1}}>
          {TOP_SECTIONS.map(({key,label})=>(
            <button key={key} onClick={()=>setSection(key)} style={{
              background:section===key?'rgba(59,130,246,0.08)':'transparent',
              border:'none',
              borderBottom:section===key?`2px solid ${T.brand}`:'2px solid transparent',
              padding:'0 16px',
              height:52,
              cursor:'pointer',
              display:'flex',alignItems:'center',gap:7,
              color:section===key?T.brandText:T.slate500,
              fontWeight:section===key?600:500,
              fontSize:13,outline:'none',
              letterSpacing:'0.01em',
              transition:'color 0.15s',
            }}>
              <span style={{opacity:0.7}}>{NAV_ICONS[key]}</span>{label}
            </button>
          ))}
        </nav>
        <div style={{background:T.successBg,border:`1px solid rgba(34,197,94,0.2)`,borderRadius:4,padding:'3px 10px',fontSize:11,color:T.success,display:'flex',alignItems:'center',gap:5}}>
          <span style={{width:5,height:5,background:T.success,borderRadius:'50%',display:'inline-block'}}/>
          Updated Jan '26
        </div>
      </div>
      {/* Content */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{maxWidth:1280,width:'100%',margin:'0 auto',padding:'0 32px',flex:1,display:'flex',flexDirection:'column',minHeight:0}}>
          {section==='overview'&&<div style={{flex:1,overflowY:'auto',paddingTop:28,paddingBottom:32}}>{renderOverview()}</div>}
          {section==='business'&&<div style={{flex:1,overflowY:'auto',paddingTop:28,paddingBottom:32}}>{renderBusiness()}</div>}
          {section==='cm'&&<div style={{flex:1,display:'flex',overflow:'hidden',paddingTop:4}}>{renderCM()}</div>}
          {section==='inbox'&&<div style={{flex:1,overflowY:'auto',paddingTop:28,paddingBottom:32}}>{renderInbox()}</div>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
